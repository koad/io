# ~/.koad-io/profiles/live-studio-standby.yaml
# Canonical execution profile: Live Studio Round Table
# Defined by VESTA-SPEC-197 v1.0
#
# Intent: standby — present, observant, audience-interactive.
# No file-mutating tools. No dispatch. Channel-only interaction.

id:              live-studio-standby
intent:          standby
isolation:       normal
candidates:
  mode:          single

scoring:
  mode:          none

verification:
  mode:          none

self_heal:
  enabled:       false
  max_rounds:    0

capture:
  trace:         true
  artifacts:     false
  session_json:  false

limits:
  timeout_ms:    null
  model:         frontier
  max_tokens:    null

# Tool policy — enforced at dispatch time
# DENY set: bash, write, edit, dispatch, dispatch_followup, dispatch_complete,
#           koad-io git, commit, build, deploy, upload, install, init, gestate,
#           spawn, sign, rebase, rebuild, start, stop, restart, test, upstart, shell
# ALLOW set: read, search, status, koad-io session, emit, announce, message,
#            tickle, pin, channel, think, conversation, usage, identity, feedback, music,
#            ask_question, answer_question, wait, wait_for_answer, wait_for_cue,
#            raise_hand, channel_* tools
