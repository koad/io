<head>
  <style>
    #drag-container {
      -webkit-app-region: drag; /* Make the entire container draggable */
    }
    body{
      background: transparent;
    }
  </style>
	<script src="/assets/font-awsome.js"></script>
</head>

<body>
	{{> WidgetQuickLaunch}}
</body>

<template name="WidgetQuickLaunch">
	<div id="drag-container">
		{{#with Entity}}

			{{#with outfit}}
				<style type="text/css">
					:root{
						--shadow-hue: {{hue}};
						--shadow-saturation: {{saturation}};
						--shadow-brightness: {{brightness}};
					}
				</style>
			{{/with}}

			<div class="container">
				<div id="navMenu" class="diamond main-diamond small">
					<div id="mainRotCorrect" class="rotCorrect draggable"><img title="Hold shift while clicking to expand the menu" class="entity-icon" src="{{image}}"></div>
				</div>
				{{#each buttons}}

					<a href="{{target}}"><div id="nav{{@index}}" class="nav nav{{@index}} diamond btn-nav small"><div class="rotCorrect"><i class="fa fa-{{key}} fa-2x" aria-hidden="true"></i></div></div></a>
					
				{{/each}}
			</div>

		{{else}}

			<div class="container">
				<div class="main-icon draggable"><img class="entity-icon" src="/logo.png"></div>
			</div>

		{{/with}}
	</div>
</template>
