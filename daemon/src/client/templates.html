<head>
  <style>
    #drag-container {
      -webkit-app-region: drag; /* Make the entire container draggable */
    }
    body{
      background: transparent;
    }
  </style>
	<script src="/assets/font-awsome.js"></script>
</head>

<body>
	{{#if isOverview}}
		{{> brandKingdomOverview}}
	{{else if isMerkle}}
		{{> MerkleView}}
	{{else}}
		{{> WidgetQuickLaunch}}
	{{/if}}
</body>

<template name="WidgetQuickLaunch">
	<div id="drag-container">
		{{#with Entity}}

			{{#with outfit}}
				<style type="text/css">
					:root{
						--shadow-hue: {{hue}};
						--shadow-saturation: {{saturation}};
						--shadow-brightness: {{brightness}};
					}
				</style>
			{{/with}}

			<div class="container">
				<div id="navMenu" class="diamond main-diamond small {{alertClass}}">
					<div id="mainRotCorrect" class="rotCorrect draggable">
						<img title="Hold shift while clicking to expand the menu" class="entity-icon" src="{{image}}" style="opacity: {{avatarOpacity}}">
						{{#if hasAlerts}}
						<div class="alert-overlay">
							{{#with firstAlert}}
							<span class="alert-text">{{body}}</span>
							{{/with}}
						</div>
						{{/if}}
					</div>
				</div>
				{{#each buttons}}

					<a href="{{target}}"><div id="nav{{@index}}" class="nav nav{{@index}} diamond btn-nav small"><div class="rotCorrect"><i class="fa fa-{{key}} fa-2x" aria-hidden="true"></i></div></div></a>

				{{/each}}
			</div>

			<div class="notification-stack">
				{{#each allNotificationItems}}
					<div class="notification-card {{source}}" data-entity="{{entity}}" data-index="{{index}}">
						<img class="notification-avatar" src="{{avatar}}" title="{{entity}}">
						<div class="notification-content">
							<span class="notification-entity">{{entity}}</span>
							<span class="notification-body">{{body}}</span>
						</div>
					</div>
				{{/each}}
			</div>

		{{else}}

			<div class="container">
				<div class="main-icon draggable"><img class="entity-icon" src="/logo.png"></div>
			</div>

		{{/with}}
	</div>
</template>
