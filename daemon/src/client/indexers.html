<template name="IndexersAdmin">
  <div class="indexers-view">
    <header class="indexers-header">
      <h1>Pluggable Indexers</h1>
      <div class="indexers-toolbar">
        <button class="indexers-reload-btn">Reload</button>
        {{#if reloadStatus}}
          <span class="indexers-reload-status indexers-reload-{{reloadStatusClass}}">{{reloadStatus}}</span>
        {{/if}}
      </div>
    </header>

    {{#if loading}}
      <div class="indexers-loading">Loading indexers...</div>
    {{else}}
      {{#if error}}
        <div class="indexers-error">{{error}}</div>
      {{else}}
        {{#if hasIndexers}}
          <table class="indexers-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Collection</th>
                <th>Mode</th>
                <th>Docs</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody>
              {{#each indexers}}
                <tr class="indexers-row {{#if isExpanded}}indexers-row-expanded{{/if}}" data-name="{{name}}">
                  <td class="indexers-name">{{name}}</td>
                  <td class="indexers-collection">{{collection}}</td>
                  <td class="indexers-mode">{{mode}}</td>
                  <td class="indexers-docs">{{docCountDisplay}}</td>
                  <td class="indexers-source">{{sourceShort}}</td>
                </tr>
                {{#if isExpanded}}
                  <tr class="indexers-detail-row" data-name="{{name}}">
                    <td colspan="5">
                      <div class="indexers-detail">
                        <div class="indexers-detail-meta">
                          <span class="indexers-meta-label">Full source:</span>
                          <span class="indexers-meta-value indexers-mono">{{source}}</span>
                        </div>
                        <div class="indexers-detail-meta">
                          <span class="indexers-meta-label">From:</span>
                          <span class="indexers-meta-value indexers-mono">{{_source}}</span>
                        </div>
                        {{#if yamlLoading}}
                          <div class="indexers-yaml-loading">Loading YAML...</div>
                        {{else}}
                          {{#if yamlContent}}
                            <pre class="indexers-yaml-content">{{yamlContent}}</pre>
                          {{/if}}
                          {{#if yamlError}}
                            <div class="indexers-yaml-error">{{yamlError}}</div>
                          {{/if}}
                        {{/if}}
                      </div>
                    </td>
                  </tr>
                {{/if}}
              {{/each}}
            </tbody>
          </table>
        {{else}}
          <p class="indexers-empty">No indexers registered. Check .koad-io-index.yaml files in entity dirs.</p>
        {{/if}}
      {{/if}}
    {{/if}}
  </div>
</template>
