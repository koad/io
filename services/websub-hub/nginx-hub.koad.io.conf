# nginx vhost: hub.koad.io → websub-hub Go binary on :8080
#
# Deploy to: /etc/nginx/sites-available/hub.koad.io
# Enable:    ln -s /etc/nginx/sites-available/hub.koad.io /etc/nginx/sites-enabled/
# TLS:       certbot --nginx -d hub.koad.io
#
# After certbot runs it will append the ssl_certificate / ssl_certificate_key
# directives and the :80→:443 redirect block automatically.

server {
    listen 80;
    server_name hub.koad.io;

    # certbot will populate TLS here.
    # Leave the HTTP block present so certbot's ACME challenge works.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hub.koad.io;

    # TLS — populated by certbot --nginx -d hub.koad.io
    # ssl_certificate     /etc/letsencrypt/live/hub.koad.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hub.koad.io/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging — count-only analytics to protect subscriber IP privacy.
    # If full access logs are needed, restrict to admin IPs only.
    access_log /var/log/nginx/hub.koad.io.access.log combined;
    error_log  /var/log/nginx/hub.koad.io.error.log warn;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSub publish notifications are small POSTs; subscriptions are GETs.
        # Generous timeouts to handle slow subscriber callbacks from the hub side.
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Body size limit — WebSub POSTs are tiny (form-encoded params only).
        client_max_body_size 64k;
    }
}
