<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>koad:io — dark passenger</title>

	<link rel="stylesheet" href="/fonts/google-symbols.css" />
	<link rel="stylesheet" href="/fonts/anek-latin.css" />

	<link rel="stylesheet" href="panes/panel/styles.css">
	<script defer type="text/javascript" src="panes/panel/logic.js"></script>
</head>
<body>
	<div class="panel">
		<header class="panel-header">
			<div class="panel-brand">
				<span class="panel-brand-name">koad:io</span>
				<span class="panel-brand-tagline">dark passenger</span>
			</div>
			<div class="panel-tier" data-tier="probing">
				<span class="panel-tier-dot"></span>
				<span class="panel-tier-label">connecting…</span>
			</div>
		</header>

		<section class="panel-actionable" hidden>
			<h3 class="panel-section-title">actionable methods</h3>
			<ul class="panel-actionable-list"></ul>
		</section>

		<section class="panel-actionable-empty">
			<p class="panel-empty-message">This page has no actionable methods on it</p>
		</section>

		<section class="panel-workspace">
			<iframe class="panel-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
		</section>

		<section class="panel-fallback" hidden>
			<h3 class="panel-section-title">offline — sovereign profile</h3>
			<div class="panel-profile"></div>
			<p class="panel-fallback-hint">
				No daemon reachable. Showing cached sovereign profile.
				Queued outbound messages will flush on reconnect.
			</p>
		</section>
	</div>
</body>
</html>
