<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>koad:io-dark-passenger</title>

	<link rel="stylesheet" href="/fonts/google-symbols.css" />
	<link rel="stylesheet" href="/fonts/anek-latin.css" />

	<link rel="stylesheet" href="styles.css">
	<script defer type="text/javascript" src="logic.js"></script>
</head>
<body>
	<div class="popup-container">
		<div class="card">
			<div class="card-content">
				<h3 class="card-title">koad:io</h3>
				<h4 class="card-subtitle"></h4>

				<div class="card-tier" data-tier="probing">
					<span class="card-tier-dot"></span>
					<span class="card-tier-label">connecting…</span>
				</div>

				<div class="card-status">
					<span class="card-corpus-count">0</span> actionable
					<span class="card-corpus-separator">·</span>
					<span class="card-scripts-count">0</span> scripts
					<span class="card-corpus-separator">·</span>
					<span class="card-queue-count">0</span> queued
				</div>

				<hr>
				<span class="card-verbage">
					<br><span class="card-active-tab"></span>
				</span>

				<div class="button-box">
					<button class="btn btn-gradient btn-copy-tab">copy tab</button>
					<button class="btn btn-gradient btn-discard-tabs">discard tabs</button>
					<button class="btn btn-gradient btn-grab-tabs">copy tabs</button>
					<button class="btn btn-gradient btn-configure-application">configure koad:io</button>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
