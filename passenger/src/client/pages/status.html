<template name='Status'>

		.banner {
			top:calc(50vh - 50vw);
		    height: 100vw;
		    width: 100vw;
		    opacity: 0.2;
		    z-index: -200;
		}
	</style>
	<div class="flex-container">
  		<center>
			<h3 class="card-title">koad:io</h3>
			<h4 class="card-subtitle">Dark Passenger</h4>

			<span class="text-muted">version {{version}}</span><br>
			<hr>
			<span class="card-verbage">
				<br><span>koad:io daemon:  <span class="text-warning">not connected</span></span>
