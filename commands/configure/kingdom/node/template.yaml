#cloud-config

hostname: kingdom-node

users:
  - name: <VPS_USER>
    groups: users, admin, docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - <VPS_SSH_KEY>

packages:
  - curl
  - ufw
  - git
  - net-tools
  - htop
  - fail2ban
  - docker.io
  - docker-compose
  - screen
  - make
  - apparmor
  - apparmor-utils
  - libsodium-dev
  - build-essential
  - gcc
  - g++
  - certbot
  - jq
  - whiptail
  - nginx

package_update: true
package_upgrade: true

runcmd:
  # Firewall
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 49152:65535/udp
  - ufw --force enable

  # nvm + node LTS for VPS user
  - su - <VPS_USER> -c 'curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash'
  - su - <VPS_USER> -c 'export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm install --lts'

  # koad-io framework clone
  - git clone https://github.com/koad/io.git /home/<VPS_USER>/.koad-io
  - chown -R <VPS_USER>:<VPS_USER> /home/<VPS_USER>/.koad-io

  # Wire ~/.koad-io/bin/ onto PATH for VPS user
  - |
    su - <VPS_USER> -c 'cat >> $HOME/.bashrc << '\''EOF'\''
# koad:io framework
export PATH="$HOME/.koad-io/bin:$PATH"
EOF'

  # Starship prompt
  - su - <VPS_USER> -c 'curl -sS https://starship.rs/install.sh | sh -s -- --yes'
  - |
    su - <VPS_USER> -c 'cat >> $HOME/.bashrc << '\''EOF'\''
eval "$(starship init bash)"
EOF'

  # Gestate the invoker
  - |
    su - <VPS_USER> -c '
      export PATH="$HOME/.koad-io/bin:$PATH"
      export NVM_DIR="$HOME/.nvm"
      . "$NVM_DIR/nvm.sh"
      KOAD_IO_QUIET=1 KOAD_IO_DOMAIN=kingdom.local KOAD_IO_HOME_MACHINE=kingdom-node \
        koad-io gestate <VPS_USER>
    '

  # Netbird mesh join
  - curl -fsSL https://pkgs.netbird.io/install.sh | sh
  - netbird up --setup-key <NETBIRD_SETUP_KEY> --management-url <NETBIRD_MGMT_URL>
  - ufw allow in on wt0

  - reboot
