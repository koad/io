{{!-- key-management.html — Key Management surface
     Full page/section for operator-grade key management.
     Surfaces: list keys, see active key, lock session, import, generate, export, delete.
     Design: Muse. Styles in sovereign-profiles.css.
     Tone: serious, sovereign, trustworthy. No decoration.
--}}

<template name="keyManagement">
  <div class="sovereign-profile-editor key-management-surface">

    <div class="km-page-header">
      <h1 class="km-page-heading">Key Management</h1>
      <p class="km-page-subhead">
        Your signing keys are stored encrypted on this device.
        You hold the only copy. There is no recovery mechanism.
        Guard your passphrase.
      </p>
    </div>

    {{!-- Global status messages --}}
    {{#if globalError}}
      <div class="km-error">{{globalError}}</div>
    {{/if}}
    {{#if globalSuccess}}
      <div class="km-success">{{globalSuccess}}</div>
    {{/if}}

    {{!-- ── Section: Stored Keys ─────────────────────────────── --}}
    <section class="km-section">
      <div class="km-section-header">
        <h2 class="km-section-heading">Stored Keys</h2>
        {{#if hasKeys}}
          <button type="button" class="km-btn-lock js-km-lock-all">Lock all</button>
        {{/if}}
      </div>

      {{#if loadingKeys}}
        <div class="km-loading-row">
          <span class="chain-loading-spinner"></span>
          <span>Loading keys…</span>
        </div>
      {{else}}
        {{#if hasKeys}}
          <ul class="km-key-list" aria-label="Stored keys">
            {{#each storedKeys}}
              <li class="km-key-row {{#if isActive}}km-key-row--active{{/if}}" data-key-id="{{id}}">
                <div class="km-key-row-info">
                  <div class="km-key-row-id-line">
                    <code class="km-key-id">{{id}}</code>
                    {{#if isActive}}
                      <span class="key-badge">unlocked</span>
                    {{else}}
                      <span class="km-key-badge--locked">locked</span>
                    {{/if}}
                  </div>
                  {{#if description}}
                    <span class="km-key-desc">{{description}}</span>
                  {{/if}}
                  {{#if publicKey}}
                    <code class="km-key-pubkey">{{publicKey}}</code>
                  {{/if}}
                </div>
                <div class="km-key-row-actions">
                  <button type="button" class="km-btn-action js-km-export-key" data-key-id="{{id}}">Export</button>
                  <button type="button" class="km-btn-action km-btn-action--danger js-km-delete-key" data-key-id="{{id}}">Delete</button>
                </div>
              </li>
            {{/each}}
          </ul>
        {{else}}
          <p class="km-empty-state">No keys stored. Import or generate one below.</p>
        {{/if}}
      {{/if}}
    </section>

    {{!-- ── Section: Export (shown when export requested) ──── --}}
    {{#if showExport}}
      <section class="km-section km-section--warning">
        <div class="km-section-header">
          <h2 class="km-section-heading">Export Key — {{exportKeyId}}</h2>
        </div>
        <div class="km-warning-banner">
          This exports your raw key material in plaintext PEM format.
          Store it offline in a secure location. Do not paste it into
          any application you do not fully control.
        </div>
        {{#if exportPem}}
          <div class="km-export-block">
            <textarea class="km-export-textarea" readonly rows="12">{{exportPem}}</textarea>
            <div class="km-export-actions">
              <button type="button" class="km-btn-action js-km-copy-export">Copy to clipboard</button>
              <button type="button" class="km-btn-action km-btn-action--secondary js-km-close-export">Done — clear from screen</button>
            </div>
          </div>
        {{else}}
          <form class="km-form" id="js-export-form" autocomplete="off">
            <div class="km-field">
              <label for="km-export-passphrase" class="km-label">Passphrase</label>
              <input type="password" id="km-export-passphrase" name="passphrase"
                     class="km-input js-export-passphrase"
                     placeholder="Enter passphrase to decrypt"
                     autocomplete="current-password" />
            </div>
            {{#if exportError}}
              <div class="km-error">{{exportError}}</div>
            {{/if}}
            <div class="km-form-actions">
              <button type="submit" class="btn-primary js-km-export-submit" {{#if exporting}}disabled{{/if}}>
                {{#if exporting}}Decrypting…{{else}}Decrypt &amp; Show{{/if}}
              </button>
              <button type="button" class="km-btn-cancel js-km-close-export">Cancel</button>
            </div>
          </form>
        {{/if}}
      </section>
    {{/if}}

    {{!-- ── Section: Delete confirmation ───────────────────── --}}
    {{#if showDeleteConfirm}}
      <section class="km-section km-section--danger">
        <div class="km-section-header">
          <h2 class="km-section-heading">Delete Key</h2>
        </div>
        <div class="km-danger-banner">
          You are about to permanently delete key <code>{{deleteKeyId}}</code> from this device.
          This cannot be undone. If you have not exported this key and you lose access to this device,
          the key is gone forever and any profiles signed by it cannot be updated.
        </div>
        <div class="km-form-actions" style="margin-top: 16px;">
          <button type="button" class="km-btn-delete js-km-delete-confirm" data-key-id="{{deleteKeyId}}">
            Delete permanently
          </button>
          <button type="button" class="km-btn-cancel js-km-delete-cancel">Cancel</button>
        </div>
      </section>
    {{/if}}

    {{!-- ── Section: Generate Key ────────────────────────────── --}}
    <section class="km-section">
      <div class="km-section-header">
        <h2 class="km-section-heading">Generate New Key</h2>
      </div>
      {{> keyGenerateForm}}
    </section>

    {{!-- ── Section: Import Key ─────────────────────────────── --}}
    <section class="km-section">
      <div class="km-section-header">
        <h2 class="km-section-heading">Import Existing Key</h2>
      </div>
      {{> keyImportForm}}
    </section>

  </div>
</template>
