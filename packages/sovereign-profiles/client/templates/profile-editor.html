<!-- profile-editor.html — Sovereign Profile Editor
     Consumer: Passenger only. Requires local key access.
     Shows name/bio/avatar/social-proofs/sigchain status; Publish button signs + publishes to IPFS.
     Design: Muse. sovereign-profiles.css provides all styles.
-->

<template name="profileEditor">
  <div class="sovereign-profile-editor">

    <h2 class="profile-editor-heading">Sovereign Profile</h2>
    <p class="profile-editor-subhead">Your identity, signed and published to IPFS. You hold the keys.</p>

    {{#if publishError}}
      <div class="profile-editor-error">{{publishError}}</div>
    {{/if}}

    {{#if publishCancelled}}
      <div class="profile-editor-cancelled">Publish cancelled. Enter your passphrase when ready.</div>
    {{/if}}

    {{#if publishSuccess}}
      <div class="profile-editor-success">
        Published. New tip: <code>{{publishedCid}}</code>
      </div>
    {{/if}}

    <form class="profile-editor-form" id="js-profile-editor-form">

      {{!-- Name --}}
      <div class="form-field">
        <label for="profile-name">Name</label>
        <input type="text" id="profile-name" name="name"
               value="{{currentProfile.name}}"
               placeholder="Your declared name"
               autocomplete="name"
               maxlength="80" />
        <span class="form-field-hint">Your declared name — this is how you introduce yourself.</span>
      </div>

      {{!-- Bio --}}
      <div class="form-field">
        <label for="profile-bio">Bio</label>
        <textarea id="profile-bio" name="bio"
                  placeholder="A short bio — one or two sentences."
                  maxlength="280">{{currentProfile.bio}}</textarea>
        <div class="form-field-footer">
          <span class="char-count js-bio-count">0 / 280</span>
        </div>
      </div>

      {{!-- Avatar --}}
      <div class="form-field">
        <label>Avatar</label>
        <div class="avatar-field-group">
          <div class="avatar-preview-circle js-avatar-preview">
            {{#if currentProfile.avatar}}
              <img src="/ipfs/{{currentProfile.avatar}}" alt="avatar" />
            {{else}}
              {{firstLetter currentProfile.name}}
            {{/if}}
          </div>
          <div class="avatar-input-stack">
            <input type="text" id="profile-avatar" name="avatar"
                   value="{{currentProfile.avatar}}"
                   placeholder="bafyrei… (paste IPFS CID or upload below)" />
            <span class="avatar-hint">Upload your avatar to IPFS first, then paste the CID here. The circle previews live.</span>
          </div>
        </div>
      </div>

      {{!-- Social Proofs --}}
      <div class="form-section">
        <h3 class="form-section-heading">Social Proofs</h3>

        <div class="social-proof-list">
          {{#each currentProfile.socialProofs}}
            <div class="social-proof-row" data-index="{{@index}}">
              <span class="proof-platform">{{platform}}</span>
              <span class="proof-handle">{{handle}}</span>
              {{#if url}}
                <a href="{{url}}" target="_blank" rel="noopener" class="proof-url-link">{{url}}</a>
              {{/if}}
              <button type="button" class="js-remove-proof btn-small" data-index="{{@index}}">Remove</button>
            </div>
          {{/each}}
        </div>

        <div class="social-proof-add">
          <input type="text" id="proof-platform" placeholder="platform" />
          <input type="text" id="proof-handle"   placeholder="handle" />
          <input type="url"  id="proof-url"      placeholder="https://…" />
          <button type="button" class="js-add-proof btn-small">Add</button>
        </div>
      </div>

      {{!-- Device Keys --}}
      <div class="form-section">
        <h3 class="form-section-heading">Signing Key</h3>
        {{#if deviceKey}}
          <p class="key-info">
            <code>{{deviceKey.id}}</code>
            <span class="key-badge">active</span>
            <span>{{deviceKey.description}}</span>
          </p>
        {{else}}
          <p class="key-warning">No key unlocked. You'll be prompted for your passphrase when you publish.</p>
        {{/if}}
      </div>

      {{!-- Sigchain Status --}}
      <div class="form-section">
        <h3 class="form-section-heading">Sigchain Status</h3>
        {{#if currentProfile.sigchainTip}}
          <div class="sigchain-status-row">
            <div class="sigchain-cid-row">
              <span class="sigchain-cid-value js-tip-cid">{{currentProfile.sigchainTip}}</span>
              <button type="button" class="cid-copy-btn js-copy-cid" data-cid="{{currentProfile.sigchainTip}}">copy</button>
            </div>
            <div class="sigchain-status-grid">
              <div class="sigchain-stat">
                <span class="sigchain-stat-label">Chain depth</span>
                <span class="sigchain-stat-value">{{currentProfile.chainDepth}}</span>
              </div>
              <div class="sigchain-stat">
                <span class="sigchain-stat-label">Last updated</span>
                <span class="sigchain-stat-value">{{currentProfile.lastUpdated}}</span>
              </div>
            </div>
          </div>
        {{else}}
          <p class="key-warning">No sigchain yet — publishing will create a new chain.</p>
        {{/if}}
      </div>

      {{!-- Actions --}}
      <div class="form-actions">
        <button type="submit" class="js-publish-profile btn-primary" disabled={{publishing}}>
          {{#if publishing}}Publishing…{{else}}Sign &amp; Publish to IPFS{{/if}}
        </button>
      </div>

    </form>

    {{!-- Passphrase modal — rendered inline, hidden until needed --}}
    {{#if showPassphraseModal}}
      {{> keyPassphraseModal (passphraseModalData)}}
    {{/if}}

    {{!-- Live Preview --}}
    <div class="profile-editor-preview">
      <span class="preview-label">Preview</span>
      <div class="preview-row">
        {{> profileCard profile=previewProfile}}
      </div>
    </div>

  </div>
</template>
