{{!-- key-passphrase-modal.html — Passphrase unlock modal
     Fires when the user needs to decrypt their local key before signing.
     Triggers: profileEditor publish button when koad.passenger.activeDeviceKey() === null.
     Design: Muse. Styles in sovereign-profiles.css.
--}}

<template name="keyPassphraseModal">
  <div class="km-overlay js-km-overlay">
    <div class="km-modal km-modal--passphrase" role="dialog" aria-modal="true" aria-labelledby="km-passphrase-heading">

      <div class="km-modal-header">
        <h2 class="km-modal-heading" id="km-passphrase-heading">Unlock your key to publish</h2>
        <p class="km-modal-subhead">
          Your signing key is encrypted at rest on this device.
          Enter your passphrase to decrypt it for this session.
          The key never leaves your device.
        </p>
      </div>

      {{#if unlockError}}
        <div class="km-error">{{unlockError}}</div>
      {{/if}}

      <form class="km-form" id="js-passphrase-form" autocomplete="off">

        {{#if activeKey}}
          <div class="km-key-hint">
            <span class="km-key-hint-label">Key</span>
            <code class="km-key-hint-id">{{activeKey.id}}</code>
            {{#if activeKey.description}}
              <span class="km-key-hint-desc">{{activeKey.description}}</span>
            {{/if}}
          </div>
        {{/if}}

        <div class="km-field">
          <label for="km-passphrase" class="km-label">Passphrase</label>
          <input
            type="password"
            id="km-passphrase"
            name="passphrase"
            class="km-input js-passphrase-input"
            placeholder="Enter passphrase"
            autocomplete="current-password"
            autofocus
          />
        </div>

        <div class="km-form-actions">
          <button type="submit" class="btn-primary js-km-unlock-btn" {{#if unlocking}}disabled{{/if}}>
            {{#if unlocking}}Decrypting…{{else}}Unlock &amp; Sign{{/if}}
          </button>
          <button type="button" class="km-btn-cancel js-km-cancel">Cancel</button>
        </div>

      </form>

    </div>
  </div>
</template>
