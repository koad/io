{{!-- profile-card.html — Compact profile card view
     Usable anywhere: kingofalldata.com, Passenger, any koad:io app.
     Data in: SovereignProfile.render(profileData, { verified, entity })
     Design: Muse. sovereign-profiles.css provides all styles.
--}}

<template name="profileCard">
  <a class="sovereign-profile-card {{#if profile.verified}}profile-verified{{/if}}"
     href="/{{profile.entity}}"
     role="article"
     aria-label="Profile: {{profile.name}}">

    {{!-- Avatar --}}
    {{#if profile.avatar}}
      <div class="profile-card-avatar">
        <img src="/ipfs/{{profile.avatar}}" alt="{{profile.name}}" loading="lazy" />
      </div>
    {{else}}
      <div class="profile-card-avatar profile-card-avatar-placeholder">
        {{firstLetter profile.name}}
      </div>
    {{/if}}

    {{!-- Body --}}
    <div class="profile-card-body">

      <div class="profile-card-name-row">
        <span class="profile-card-name">{{profile.name}}</span>
        {{#if profile.verified}}
          <span class="profile-verified-badge" title="Chain verified — all signatures valid">&#10003;</span>
        {{/if}}
      </div>

      {{#if profile.entity}}
        <div class="profile-card-handle">@{{profile.entity}}</div>
      {{/if}}

      {{#if profile.bio}}
        <div class="profile-card-bio" title="{{profile.bio}}">{{profile.bio}}</div>
      {{/if}}

      {{!-- Footer: verification state + bond count --}}
      <div class="profile-card-footer">
        {{#unless profile.verified}}
          <span class="profile-unverified-badge">unverified</span>
        {{/unless}}
        {{#if profile.bondCount}}
          <span class="profile-bond-badge">{{profile.bondCount}} bonds</span>
        {{/if}}
      </div>

    </div>

  </a>
</template>
