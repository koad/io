{{!-- kingdoms-overview.html — Kingdoms index view
     Lists all kingdoms the daemon is indexing.
     Suitable for a /kingdoms route or home-page panel.
     Consumer decides route and subscription scope.
     Design: Muse. sovereign-profiles.css (.km-overview-*) provides styles.
--}}

<template name="kingdomsOverview">
  <div class="km-overview sovereign-profile-full">

    <div class="km-overview-header">
      <h2 class="km-overview-heading">Kingdoms</h2>
      <p class="km-overview-subhead">Sovereign participation units indexed by this daemon.</p>
    </div>

    {{#if loading}}
      <div class="km-loading-row">
        <div class="chain-loading-spinner"></div>
        Loading kingdoms…
      </div>
    {{else}}
      {{#if kingdoms.length}}
        <ul class="km-overview-list">
          {{#each kingdoms}}
            <li class="km-overview-item">
              <div class="km-overview-item-main">
                <span class="km-overview-name">{{name}}</span>
                {{#if domain}}
                  <span class="km-overview-domain">{{domain}}</span>
                {{/if}}
              </div>
              <div class="km-overview-item-meta">
                {{#if sovereign}}
                  <span class="km-overview-sovereign">{{sovereign}}</span>
                {{/if}}
                {{#if sovereigntyModel}}
                  <span class="km-overview-model-badge km-overview-model-{{sovereigntyModel}}">{{sovereigntyModel}}</span>
                {{/if}}
                {{#if memberCount}}
                  <span class="km-overview-count">{{memberCount}} members</span>
                {{/if}}
              </div>
            </li>
          {{/each}}
        </ul>
      {{else}}
        <p class="km-empty-state">No kingdoms indexed yet.</p>
      {{/if}}
    {{/if}}

  </div>
</template>
