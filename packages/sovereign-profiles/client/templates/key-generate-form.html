{{!-- key-generate-form.html — Key Generation sub-component
     Generates a fresh Ed25519 key, encrypts at rest with a user passphrase.
     Design: Muse. Styles in sovereign-profiles.css.
--}}

<template name="keyGenerateForm">
  <form class="km-form" id="js-key-generate-form" autocomplete="off">

    {{#if generateError}}
      <div class="km-error">{{generateError}}</div>
    {{/if}}
    {{#if generateSuccess}}
      <div class="km-success">{{generateSuccess}}</div>
    {{/if}}

    <div class="km-field">
      <label for="km-gen-entity" class="km-label">Entity name</label>
      <input
        type="text"
        id="km-gen-entity"
        name="entity"
        class="km-input js-gen-entity"
        placeholder="e.g. juno, alice, yourhandle"
        maxlength="80"
        autocomplete="off"
      />
      <span class="km-field-hint">
        The entity this key belongs to. Used as the key description — not embedded in the key itself.
      </span>
    </div>

    <div class="km-field">
      <label for="km-gen-desc" class="km-label">Description <span class="km-label-optional">(optional)</span></label>
      <input
        type="text"
        id="km-gen-desc"
        name="description"
        class="km-input js-gen-desc"
        placeholder="e.g. Laptop — April 2026"
        maxlength="120"
        autocomplete="off"
      />
    </div>

    <div class="km-field">
      <label for="km-gen-passphrase" class="km-label">Passphrase</label>
      <input
        type="password"
        id="km-gen-passphrase"
        name="passphrase"
        class="km-input js-gen-passphrase"
        placeholder="Choose a strong passphrase"
        autocomplete="new-password"
      />
      <span class="km-field-hint">
        This passphrase encrypts the key in IndexedDB using AES-GCM-256 derived via PBKDF2.
        There is no recovery mechanism. Do not forget it.
      </span>
    </div>

    <div class="km-field">
      <label for="km-gen-passphrase-confirm" class="km-label">Confirm passphrase</label>
      <input
        type="password"
        id="km-gen-passphrase-confirm"
        name="passphraseConfirm"
        class="km-input js-gen-passphrase-confirm"
        placeholder="Confirm passphrase"
        autocomplete="new-password"
      />
    </div>

    <div class="km-form-actions">
      <button type="submit" class="btn-primary js-km-generate-submit" {{#if generating}}disabled{{/if}}>
        {{#if generating}}Generating…{{else}}Generate Key{{/if}}
      </button>
    </div>

  </form>
</template>
