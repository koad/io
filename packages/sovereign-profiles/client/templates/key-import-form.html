<!-- key-import-form.html — Key Import sub-component
     Paste an existing key (hex seed or OpenSSH/PEM), label it, encrypt at rest.
     Design: Muse. Styles in sovereign-profiles.css.
-->

<template name="keyImportForm">
  <form class="km-form" id="js-key-import-form" autocomplete="off">

    {{#if importError}}
      <div class="km-error">{{importError}}</div>
    {{/if}}
    {{#if importSuccess}}
      <div class="km-success">{{importSuccess}}</div>
    {{/if}}

    <div class="km-field">
      <label for="km-import-seed" class="km-label">Key material</label>
      <textarea
        id="km-import-seed"
        name="seed"
        class="km-input km-textarea js-import-seed"
        rows="5"
        placeholder="Paste hex seed, raw bytes (base64), or OpenSSH private key block"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <span class="km-field-hint">
        Ed25519 keys only. 32-byte hex (64 chars) or an OpenSSH private key block.
      </span>
    </div>

    <div class="km-field">
      <label for="km-import-label" class="km-label">Label <span class="km-label-optional">(optional)</span></label>
      <input
        type="text"
        id="km-import-label"
        name="label"
        class="km-input js-import-label"
        placeholder="e.g. primary device key"
        maxlength="80"
        autocomplete="off"
      />
    </div>

    <div class="km-field">
      <label for="km-import-passphrase" class="km-label">Passphrase</label>
      <input
        type="password"
        id="km-import-passphrase"
        name="passphrase"
        class="km-input js-import-passphrase"
        placeholder="Choose a passphrase to encrypt this key at rest"
        autocomplete="new-password"
      />
      <span class="km-field-hint">
        Used to encrypt the key in IndexedDB. You will need this passphrase every time you sign.
      </span>
    </div>

    <div class="km-field">
      <label for="km-import-passphrase-confirm" class="km-label">Confirm passphrase</label>
      <input
        type="password"
        id="km-import-passphrase-confirm"
        name="passphraseConfirm"
        class="km-input js-import-passphrase-confirm"
        placeholder="Confirm passphrase"
        autocomplete="new-password"
      />
    </div>

    <div class="km-form-actions">
      <button type="submit" class="btn-primary js-km-import-submit" disabled={{importing}}>
        {{#if importing}}Importing…{{else}}Import Key{{/if}}
      </button>
    </div>

  </form>
</template>
