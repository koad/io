<template name="KingdomOverview">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #121212 !important; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: auto !important; }

    .overview-header {
      padding: 16px 32px 12px;
      border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 12px;
    }
    .overview-header .glyph { font-size: 28px; color: #888; cursor: pointer; }
    .overview-header h1 { font-size: 18px; font-weight: 400; color: #aaa; letter-spacing: 1px; }
    .overview-header h1 span { color: #e0e0e0; font-weight: 600; }

    /* Nav tabs */
    .nav-tabs {
      display: flex; gap: 2px; margin-left: auto; align-items: center;
    }
    .nav-tab {
      font-size: 11px; color: #666; display: flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-radius: 4px; cursor: pointer;
      transition: background 0.15s, color 0.15s; user-select: none;
    }
    .nav-tab:hover { background: #1e1e1e; color: #aaa; }
    .nav-tab.active { background: #1a2a2a; color: #5bd5b5; }
    .nav-tab .val { font-weight: 600; font-size: 13px; }
    .nav-tab.active .val { color: #5bd5b5; }
    .nav-tab.alert-tab .val { color: #d4a535; }

    .overview-body { display: flex; gap: 0; height: calc(100vh - 56px); }
    .main-panel { flex: 1; padding: 20px 28px; overflow-y: auto; }
    .activity-panel { width: 460px; min-width: 340px; border-left: 1px solid #2a2a2a; overflow-y: auto; display: flex; flex-direction: column; }

    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-label .count { color: #555; font-weight: 400; }

    /* Kingdom banner */
    .kingdom-banner {
      margin-bottom: 16px; padding: 12px 16px;
      background: #161b1e; border: 1px solid #1e2a2e; border-radius: 6px;
      display: flex; gap: 24px; flex-wrap: wrap;
    }
    .kingdom-item { font-size: 12px; color: #888; }
    .kingdom-item .kv { color: #aaa; font-weight: 500; }
    .kingdom-item .kl { color: #556; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }

    /* Entity grid */
    .entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

    /* Entity card — layered gradient effect ported from passenger popup.
       Two layers: an oversized animated multi-color gradient behind a
       dotted radial pattern. The dots are semi-transparent so the
       gradient bleeds through.
         - .active-5m: uses entity's accent color (calm, on-brand)
         - :hover: purple→pink→yellow (original passenger palette, bright)
         - hover overrides active when both are true
       Each entity's gradient uses CSS vars set inline on the card. */
    .entity-card {
      position: relative;
      border-radius: 6px;
      border-left: 3px solid #444;
      cursor: pointer; user-select: none;
      overflow: hidden;
      background: #151515;
      transition: border-color 350ms ease;
    }
    /* Active-5m layer — uses entity's outfit color (set via --entity-hue on the card) */
    .entity-card::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        130deg,
        transparent 0% 28%,
        hsla(var(--entity-hue, 180), 80%, 55%, 0.6) 55%,
        hsla(calc(var(--entity-hue, 180) + 40), 85%, 60%, 0.55) 78%,
        hsla(calc(var(--entity-hue, 180) + 80), 90%, 65%, 0.5) 100%
      );
      background-size: 400% 400%;
      background-position: 0% 0%;
      transition: background-position 700ms ease, transform 700ms ease, opacity 450ms ease;
      pointer-events: none;
      opacity: 0;
      z-index: 1;
    }
    /* Hover layer — bright passenger-popup palette, sits on top */
    .entity-card::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        130deg,
        transparent 0% 30%,
        rgba(98, 0, 234, 0.65) 62%,
        rgba(236, 64, 122, 0.65) 82%,
        rgba(253, 216, 53, 0.6) 100%
      );
      background-size: 400% 400%;
      background-position: 0% 0%;
      transition: background-position 500ms ease, transform 500ms ease, opacity 350ms ease;
      pointer-events: none;
      opacity: 0;
      z-index: 2;
    }
    .entity-card-inner {
      position: relative;
      z-index: 3;
      padding: 12px 14px;
      background-image: radial-gradient(
        rgba(255, 255, 255, 0.14) 8%,
        transparent 8%
      );
      background-size: 18px 18px;
      background-position: 0% 0%;
      transition: background-position 500ms ease;
    }
    /* Active-5m: entity-color gradient reveals, slow drift */
    .entity-card.active-5m::before {
      opacity: 1;
      background-position: 100% 100%;
      transform: scale(1.12);
      animation: entityDrift 12s ease-in-out infinite;
    }
    @keyframes entityDrift {
      0%, 100% { background-position: 100% 100%; }
      50% { background-position: 30% 60%; }
    }
    .entity-card.active-5m .entity-card-inner {
      background-position: -6% 0%;
    }
    /* Hover: passenger-palette gradient overpowers, quick shift */
    .entity-card:hover::after {
      opacity: 1;
      background-position: 100% 100%;
      transform: scale(1.08);
    }
    .entity-card:hover .entity-card-inner {
      background-position: -12% 0%;
    }
    .entity-card:hover { border-left-color: #5bd5b5 !important; }

    /* Clickable avatar link — stop bubbling on click handled in JS */
    a.entity-avatar { text-decoration: none; }
    a.entity-avatar:hover { cursor: pointer; }

    /* Bullpen — dormant entities shown as bare avatars */
    .bullpen {
      display: flex; flex-wrap: wrap; gap: 18px;
      padding: 8px 4px;
    }
    .bullpen-avatar {
      position: relative;
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: #fff;
      background: #333; overflow: visible;
      text-decoration: none;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .bullpen-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .bullpen-letter {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .bullpen-label {
      position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #555; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity 200ms ease;
    }
    .bullpen-avatar:hover {
      opacity: 1;
      transform: translateY(-2px);
    }
    .bullpen-avatar:hover .bullpen-label {
      opacity: 1;
      color: #aaa;
    }
    .bullpen-avatar.active-5m {
      opacity: 1;
      box-shadow: 0 0 0 2px hsla(var(--entity-hue, 180), 70%, 55%, 0.6);
    }
    .entity-card-top { display: flex; align-items: flex-start; gap: 12px; }
    .entity-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: #fff;
      background: #333; overflow: hidden;
      position: relative;
    }
    .entity-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .status-dot {
      position: absolute; bottom: 0px; right: 0px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid #1a1a1a;
    }
    .status-dot.status-live { background: #5bd5b5; box-shadow: 0 0 4px #5bd5b5; }
    .status-dot.status-recent { background: #d4a535; }
    .status-dot.status-idle { background: #555; }
    .status-dot.status-cold { background: #2a2a2a; }

    .entity-info { flex: 1; min-width: 0; }
    .entity-title-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .entity-handle { font-size: 14px; font-weight: 600; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
    .entity-last-seen {
      font-size: 10px; color: #555; flex-shrink: 0;
      font-family: monospace;
    }
    .entity-last-seen.live { color: #5bd5b5; }
    .entity-last-seen.recent { color: #d4a535; }

    .entity-tagline { font-size: 11px; color: #777; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
    .entity-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .entity-stat { font-size: 10px; color: #666; }
    .entity-stat .stat-val { color: #999; font-weight: 600; }
    .entity-role {
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
      background: #1a2a3a; color: #5b8fbd; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
    }
    .entity-kingdom {
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
      background: #2a1a3a; color: #a55bd5; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
    }
    .entity-host {
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
      background: #1a1a2a; color: #7b8bbf; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
    }
    .entity-alert-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #d4a535;
      flex-shrink: 0; animation: alertPulse 2s ease-in-out infinite;
    }
    @keyframes alertPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 24h activity row */
    .entity-24h {
      display: flex; gap: 10px; margin-top: 6px; padding-top: 6px;
      border-top: 1px solid #242424; font-size: 10px; color: #555;
    }
    .entity-24h .h24-stat { display: flex; align-items: center; gap: 3px; }
    .entity-24h .h24-val { color: #888; font-weight: 600; }
    .entity-24h .h24-label { color: #555; }
    .entity-24h .h24-muted { color: #2a2a2a; }

    /* Flight indicators on entity cards */
    .flight-indicator {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; padding-top: 5px; border-top: 1px solid #252525;
    }
    .flight-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }
    .flight-brief { font-size: 11px; color: #5bd5b5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .flight-elapsed { font-size: 10px; color: #555; flex-shrink: 0; }
    .flight-model { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #1a3a3a; color: #5bd5b5; flex-shrink: 0; }

    /* Expanded card detail */
    .entity-detail {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid #252525;
      font-size: 11px; color: #888;
    }
    .detail-section { margin-bottom: 10px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-heading {
      font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #555; margin-bottom: 4px; font-weight: 600;
    }
    .detail-list { list-style: none; padding: 0; margin: 0; }
    .detail-list li {
      padding: 2px 0; color: #888; font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-list li .bond-type { color: #5b8fbd; font-size: 9px; margin-left: 4px; }
    .detail-list li .key-type { color: #8b7bbf; font-size: 9px; margin-left: 4px; }
    .detail-env-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
    }
    .detail-env-key { color: #5b8fbd; font-family: monospace; font-size: 10px; }
    .detail-env-val { color: #999; font-family: monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-alerts { list-style: none; padding: 0; margin: 0; }
    .detail-alerts li {
      padding: 3px 0; font-size: 11px; display: flex; align-items: center; gap: 6px;
    }
    .detail-alerts li .alert-source {
      font-size: 9px; padding: 1px 5px; border-radius: 2px;
      text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600;
    }
    .detail-alerts li .alert-source.alerts { background: #4a3a1a; color: #d4a535; }
    .detail-alerts li .alert-source.notifications { background: #1a3a5c; color: #5b9bd5; }

    /* ---- Flight table view ---- */
    .flight-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .flight-table th {
      text-align: left; padding: 6px 10px; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px; color: #555;
      border-bottom: 1px solid #2a2a2a; font-weight: 600;
    }
    .flight-table td {
      padding: 6px 10px; border-bottom: 1px solid #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 300px; color: #999;
    }
    .flight-table tr:hover td { background: #1a1a1a; }
    .flight-table .status-flying { color: #5bd5b5; }
    .flight-table .status-landed { color: #777; }
    .flight-table .status-stale { color: #d4a535; }
    .flight-table .status-closed { color: #777; }
    .flight-table .entity-col { font-weight: 600; }
    .flight-table .brief-col { color: #aaa; max-width: 360px; }
    .flight-table .time-col { font-family: monospace; font-size: 11px; color: #666; }
    .flight-table .model-col { font-size: 10px; }
    .flight-filter-bar {
      display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
    }
    .flight-filter {
      font-size: 10px; padding: 3px 10px; border-radius: 3px; cursor: pointer;
      background: #1a1a1a; color: #777; border: 1px solid #2a2a2a;
      transition: background 0.15s; user-select: none;
    }
    .flight-filter:hover { background: #222; color: #aaa; }
    .flight-filter.active { background: #1a3a3a; color: #5bd5b5; border-color: #2a4a4a; }

    /* ---- Bonds view ---- */
    .bonds-entity-group { margin-bottom: 16px; }
    .bonds-entity-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #222; margin-bottom: 6px;
    }
    .bonds-entity-name { font-size: 14px; font-weight: 600; }
    .bonds-entity-count { font-size: 11px; color: #555; }
    .bond-row {
      display: flex; align-items: center; gap: 10px; padding: 4px 12px;
      font-size: 12px; color: #888;
    }
    .bond-row .bond-name { flex: 1; }
    .bond-row .bond-kind {
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
      background: #1a2a3a; color: #5b8fbd; text-transform: uppercase;
    }

    /* ---- Bonds graph (force-directed mind map) ---- */
    .bond-graph {
      position: relative; width: 100%; height: calc(100vh - 160px);
      background: radial-gradient(ellipse at center, #151515 0%, #0d0d0d 100%);
      border: 1px solid #1e1e1e; border-radius: 6px; overflow: hidden;
      user-select: none;
    }
    .bond-graph-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .bond-edge {
      stroke: #3a3a3a; stroke-width: 1; fill: none;
      transition: stroke 0.2s;
    }
    .bond-edge.highlighted { stroke: #5bd5b5; stroke-width: 2; }
    .bond-edge-arrow { fill: #3a3a3a; }
    .bond-edge.highlighted .bond-edge-arrow { fill: #5bd5b5; }
    .bond-node {
      position: absolute; width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: #fff;
      background: #333; overflow: hidden; cursor: grab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transform: translate(-50%, -50%);
      transition: box-shadow 0.2s;
      z-index: 2;
    }
    .bond-node:hover {
      box-shadow: 0 0 0 3px rgba(91, 213, 181, 0.4), 0 2px 8px rgba(0,0,0,0.5);
      z-index: 5;
    }
    .bond-node.dragging { cursor: grabbing; z-index: 10; }
    .bond-node.active-now {
      animation: cardGlow 2s ease-in-out infinite;
    }
    .bond-node img { width: 100%; height: 100%; object-fit: cover; }
    .bond-node-label {
      position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #888; white-space: nowrap;
      pointer-events: none; font-weight: 500;
      text-shadow: 0 1px 2px #000;
    }
    .bond-node:hover .bond-node-label { color: #5bd5b5; }

    /* ---- Keys view ---- */
    .keys-entity-group { margin-bottom: 16px; }
    .keys-entity-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #222; margin-bottom: 6px;
    }
    .keys-entity-name { font-size: 14px; font-weight: 600; }
    .keys-entity-count { font-size: 11px; color: #555; }
    .key-row {
      display: flex; align-items: center; gap: 10px; padding: 4px 12px;
      font-size: 12px; color: #888;
    }
    .key-row .key-name { flex: 1; font-family: monospace; font-size: 11px; }
    .key-row .key-kind {
      font-size: 9px; padding: 1px 6px; border-radius: 3px;
      background: #2a1a3a; color: #8b7bbf; text-transform: uppercase;
    }

    /* ---- Tickles view ---- */
    .tickle-entity-group { margin-bottom: 16px; }
    .tickle-entity-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #222; margin-bottom: 6px;
    }
    .tickle-entity-name { font-size: 14px; font-weight: 600; }
    .tickle-entity-count { font-size: 11px; color: #555; }
    .tickle-row {
      padding: 3px 12px; font-size: 12px; color: #888;
    }

    /* ---- Alerts view ---- */
    .alerts-entity-group { margin-bottom: 16px; }
    .alerts-entity-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #222; margin-bottom: 6px;
    }
    .alerts-entity-name { font-size: 14px; font-weight: 600; }
    .alert-row {
      display: flex; align-items: flex-start; gap: 8px; padding: 4px 12px;
      font-size: 12px;
    }
    .alert-row .alert-source {
      font-size: 9px; padding: 1px 5px; border-radius: 2px;
      text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; flex-shrink: 0;
      margin-top: 2px;
    }
    .alert-row .alert-source.alerts { background: #4a3a1a; color: #d4a535; }
    .alert-row .alert-source.notifications { background: #1a3a5c; color: #5b9bd5; }
    .alert-row .alert-text { color: #999; line-height: 1.4; }

    /* ---- Activity panel ---- */
    .activity-section { padding: 14px 18px; }
    .activity-section + .activity-section { border-top: 1px solid #1e1e1e; }

    .flight-pinned {
      padding: 8px 10px; margin-bottom: 4px;
      background: #0e2020; border-radius: 4px; border-left: 2px solid #5bd5b5;
    }
    .flight-pinned .emission-body { color: #7abfbf; }

    .emission-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .emission-item:last-child { border-bottom: none; }
    .emission-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .emission-entity { font-size: 12px; font-weight: 600; }
    .emission-type {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .emission-type.notice { background: #1a3a5c; color: #5b9bd5; }
    .emission-type.warning { background: #4a3a1a; color: #d4a535; }
    .emission-type.error { background: #4a1a1a; color: #d55b5b; }
    .emission-type.request { background: #3a1a4a; color: #a55bd5; }
    .emission-type.flight { background: #1a3a3a; color: #5bd5b5; }
    .emission-type.alert { background: #4a3a1a; color: #d4a535; }
    .emission-time { font-size: 10px; color: #444; margin-left: auto; }
    .emission-body { font-size: 12px; color: #888; line-height: 1.4; }
    .emission-stats { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .emission-stat { font-size: 10px; color: #555; }
    .emission-stat .sv { color: #777; font-weight: 600; }
    .empty-state { color: #444; font-size: 12px; font-style: italic; padding: 16px 0; }

    /* Tier nudge — subtle upsell for public visitors */
    .tier-nudge {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-top: 1px solid #1a1a1a; margin-top: 4px;
      font-size: 11px; color: #555;
    }
    .tier-nudge-text { flex: 1; }
    .tier-nudge-link {
      color: #5bd5b5; text-decoration: none; font-weight: 600;
      font-size: 10px; opacity: 0.75; transition: opacity 0.15s;
    }
    .tier-nudge-link:hover { opacity: 1; }

    .alert-item { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .alert-body { font-size: 12px; color: #c9a44a; line-height: 1.3; }
    .notif-body { font-size: 12px; color: #5b9bd5; line-height: 1.3; }

    /* Scrollbar styling */
    .main-panel::-webkit-scrollbar,
    .activity-panel::-webkit-scrollbar { width: 6px; }
    .main-panel::-webkit-scrollbar-thumb,
    .activity-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .main-panel::-webkit-scrollbar-track,
    .activity-panel::-webkit-scrollbar-track { background: transparent; }
  </style>

  <div class="overview-header">
    <span class="glyph" data-view="entities">&#9674;</span>
    <h1>koad:io &mdash; <span>{{hostname}}</span></h1>
    <div class="nav-tabs">
      <div class="nav-tab {{activeClass 'entities'}}" data-view="entities">
        <span class="val">{{entityCount}}</span> entities
      </div>
      <div class="nav-tab {{activeClass 'flights'}}" data-view="flights">
        <span class="val">{{allFlightsCount}}</span> flights{{#if flyingCount}} <span class="val" style="color: #5bd5b5; margin-left: 4px;">{{flyingCount}}</span> live{{/if}}
      </div>
      <div class="nav-tab {{activeClass 'bonds'}}" data-view="bonds">
        <span class="val">{{totalBonds}}</span> bonds
      </div>
      <div class="nav-tab {{activeClass 'keys'}}" data-view="keys">
        <span class="val">{{totalKeys}}</span> keys
      </div>
      <div class="nav-tab {{activeClass 'tickles'}}" data-view="tickles">
        <span class="val">{{totalTickles}}</span> tickles
      </div>
      {{#if alertCount}}
      <div class="nav-tab alert-tab {{activeClass 'alerts'}}" data-view="alerts">
        <span class="val">{{alertCount}}</span> alerts
      </div>
      {{/if}}
    </div>
  </div>

  <div class="overview-body">
    <div class="main-panel">

      <!-- ============ ENTITIES VIEW ============ -->
      {{#if viewIs 'entities'}}

        {{#if hasKingdoms}}
        <div class="section-label">Kingdoms</div>
        {{#each kingdoms}}
          <div class="kingdom-banner">
            <div class="kingdom-item"><span class="kl">name</span><span class="kv">{{name}}</span></div>
            {{#if domain}}<div class="kingdom-item"><span class="kl">domain</span><span class="kv">{{domain}}</span></div>{{/if}}
            {{#if sovereign}}<div class="kingdom-item"><span class="kl">sovereign</span><span class="kv">{{sovereign}}</span></div>{{/if}}
            {{#if sovereigntyModel}}<div class="kingdom-item"><span class="kl">model</span><span class="kv">{{sovereigntyModel}}</span></div>{{/if}}
            <div class="kingdom-item"><span class="kl">members</span><span class="kv">{{memberCount}}</span></div>
            {{#if rootSigchainCid}}<div class="kingdom-item"><span class="kl">sigchain</span><span class="kv" style="font-family: monospace; font-size: 10px;">{{rootSigchainCid}}</span></div>{{/if}}
          </div>
        {{/each}}
        {{/if}}

        <div class="section-label">Entities <span class="count">({{entityCount}})</span></div>
        <div class="entity-grid">
          {{#each activeEntities}}
            <div class="entity-card {{#if isExpanded}}expanded{{/if}} {{#if isActiveNow}}active-now{{/if}} {{#if isActive5m}}active-5m{{/if}}" data-handle="{{handle}}" style="border-left-color: {{accentColor}}; --entity-hue: {{entityHue}};">
            <div class="entity-card-inner">
              <div class="entity-card-top">
                <a href="{{entityProfileUrl handle}}" target="mainwebsite" class="entity-avatar entity-profile-link" style="background: {{accentColor}};" title="Open {{handle}} profile">
                  {{#if avatarImage}}
                    <img src="{{avatarImage}}" alt="{{handle}}">
                  {{else}}
                    {{firstLetter}}
                  {{/if}}
                  <span class="status-dot status-{{statusLevel}}" title="{{statusLabel}}"></span>
                </a>
                <div class="entity-info">
                  <div class="entity-title-row">
                    <div class="entity-handle">
                      {{handle}}
                      {{#if hasAlerts}}<span class="entity-alert-dot"></span>{{/if}}
                    </div>
                    <div class="entity-last-seen {{statusLevel}}" title="last activity">
                      {{#if lastSeenText}}{{lastSeenText}}{{else}}—{{/if}}
                    </div>
                  </div>
                  {{#if tagline}}<div class="entity-tagline">{{tagline}}</div>{{/if}}
                  <div class="entity-meta">
                    {{#if role}}<span class="entity-role">{{role}}</span>{{/if}}
                    {{#if kingdomId}}<span class="entity-kingdom">{{kingdomId}}</span>{{/if}}
                    {{#if host}}<span class="entity-host">{{host}}</span>{{/if}}
                    {{#if keyCount}}<span class="entity-stat"><span class="stat-val">{{keyCount}}</span> keys</span>{{/if}}
                    {{#if bondCount}}<span class="entity-stat"><span class="stat-val">{{bondCount}}</span> bonds</span>{{/if}}
                    {{#if tickleCount}}<span class="entity-stat"><span class="stat-val">{{tickleCount}}</span> tickles</span>{{/if}}
                  </div>
                </div>
              </div>

              <div class="entity-24h">
                <span class="h24-stat">
                  <span class="h24-val {{#unless flights24h}}h24-muted{{/unless}}">{{flights24h}}</span>
                  <span class="h24-label">flights</span>
                </span>
                <span class="h24-stat">
                  <span class="h24-val {{#unless emissions24h}}h24-muted{{/unless}}">{{emissions24h}}</span>
                  <span class="h24-label">emissions</span>
                </span>
                {{#if alertItemCount}}
                <span class="h24-stat">
                  <span class="h24-val" style="color: #d4a535;">{{alertItemCount}}</span>
                  <span class="h24-label">alerts</span>
                </span>
                {{/if}}
                {{#if lastFlightAge}}
                <span class="h24-stat" style="margin-left: auto;">
                  <span class="h24-label">last flight</span>
                  <span class="h24-val">{{lastFlightAge}}</span>
                </span>
                {{/if}}
              </div>

              {{#if activeFlight}}
                <div class="flight-indicator">
                  <span class="flight-dot" style="background: {{accentColor}};"></span>
                  <span class="flight-brief" title="{{flightSummary}}">{{flightBrief}}</span>
                  <span class="flight-elapsed">{{flightElapsed}}</span>
                  {{#if flightModel}}<span class="flight-model">{{flightModel}}</span>{{/if}}
                </div>
              {{/if}}

              {{#if isExpanded}}
                <div class="entity-detail">
                  {{#if alertItems.length}}
                  <div class="detail-section">
                    <div class="detail-heading">Alerts &amp; Notifications</div>
                    <ul class="detail-alerts">
                      {{#each alertItems}}
                        <li><span class="alert-source {{source}}">{{source}}</span><span>{{text}}</span></li>
                      {{/each}}
                    </ul>
                  </div>
                  {{/if}}
                  {{#if bonds.length}}
                  <div class="detail-section">
                    <div class="detail-heading">Bonds ({{bondCount}})</div>
                    <ul class="detail-list">
                      {{#each bonds}}<li>{{base}}<span class="bond-type">{{type}}</span></li>{{/each}}
                    </ul>
                  </div>
                  {{/if}}
                  {{#if keys.length}}
                  <div class="detail-section">
                    <div class="detail-heading">Keys ({{keyCount}})</div>
                    <ul class="detail-list">
                      {{#each keys}}<li>{{filename}}<span class="key-type">{{type}}</span></li>{{/each}}
                    </ul>
                  </div>
                  {{/if}}
                  {{#if tickles.length}}
                  <div class="detail-section">
                    <div class="detail-heading">Tickles ({{tickleCount}})</div>
                    <ul class="detail-list">
                      {{#each tickles}}<li>{{this}}</li>{{/each}}
                    </ul>
                  </div>
                  {{/if}}
                  {{#if recentEntityFlights.length}}
                  <div class="detail-section">
                    <div class="detail-heading">Recent Flights</div>
                    <ul class="detail-list">
                      {{#each recentEntityFlights}}
                        <li style="color: {{statusColor}};">{{briefSlug}} &mdash; {{elapsed}} {{#if model}}<span class="key-type">{{model}}</span>{{/if}}</li>
                      {{/each}}
                    </ul>
                  </div>
                  {{/if}}
                </div>
              {{/if}}
            </div>{{! /.entity-card-inner }}
            </div>{{! /.entity-card }}
          {{/each}}
        </div>

        {{#if bullpenEntities.length}}
          <div class="section-label" style="margin-top: 24px;">
            Bullpen <span class="count">({{bullpenEntities.length}})</span>
            <span style="font-size: 10px; color: #444; font-style: italic; text-transform: none; letter-spacing: 0; margin-left: 8px;">no activity in 24h</span>
          </div>
          <div class="bullpen">
            {{#each bullpenEntities}}
              <a href="{{entityProfileUrl handle}}" target="mainwebsite"
                 class="bullpen-avatar {{#if isActive5m}}active-5m{{/if}}"
                 style="background: {{accentColor}}; --entity-hue: {{entityHue}};"
                 title="{{handle}}{{#if lastSeenText}} — {{lastSeenText}}{{/if}}">
                {{#if avatarImage}}
                  <img src="{{avatarImage}}" alt="{{handle}}">
                {{else}}
                  <span class="bullpen-letter">{{firstLetter}}</span>
                {{/if}}
                <span class="bullpen-label">{{handle}}</span>
              </a>
            {{/each}}
          </div>
        {{/if}}
      {{/if}}

      <!-- ============ FLIGHTS VIEW ============ -->
      {{#if viewIs 'flights'}}
        <div class="section-label">Flights <span class="count">({{allFlightsCount}})</span></div>
        <div class="flight-filter-bar">
          <div class="flight-filter {{flightFilterClass 'all'}}" data-filter="all">All</div>
          <div class="flight-filter {{flightFilterClass 'flying'}}" data-filter="flying">Flying</div>
          <div class="flight-filter {{flightFilterClass 'stale'}}" data-filter="stale">Stale</div>
          <div class="flight-filter {{flightFilterClass 'landed'}}" data-filter="landed">Landed</div>
        </div>
        <table class="flight-table">
          <thead>
            <tr>
              <th>Status</th>
              <th>Entity</th>
              <th>Brief</th>
              <th>Note</th>
              <th>Started</th>
              <th>Elapsed</th>
              <th>Model</th>
            </tr>
          </thead>
          <tbody>
            {{#each flightRows}}
              <tr>
                <td class="status-{{status}}">{{status}}</td>
                <td class="entity-col" style="color: {{entityColor}};">{{entity}}</td>
                <td class="brief-col">{{briefSlug}}</td>
                <td>{{briefSummary}}</td>
                <td class="time-col">{{startedFmt}}</td>
                <td class="time-col">{{elapsed}}</td>
                <td class="model-col">{{model}}</td>
              </tr>
            {{/each}}
          </tbody>
        </table>
        {{#unless flightRows}}
          <div class="empty-state">No flights match the current filter.</div>
        {{/unless}}
      {{/if}}

      <!-- ============ BONDS VIEW ============ -->
      {{#if viewIs 'bonds'}}
        <div class="section-label">
          Trust Bonds <span class="count">({{totalBonds}})</span>
          <div class="flight-filter-bar" style="margin-left: auto; margin-bottom: 0;">
            <div class="flight-filter {{bondViewClass 'graph'}}" data-bond-view="graph">Graph</div>
            <div class="flight-filter {{bondViewClass 'list'}}" data-bond-view="list">List</div>
          </div>
        </div>

        {{#if bondViewIs 'graph'}}
          <div id="bond-graph" class="bond-graph">
            <svg class="bond-graph-svg"></svg>
          </div>
        {{/if}}

        {{#if bondViewIs 'list'}}
          {{#each bondsGrouped}}
            <div class="bonds-entity-group">
              <div class="bonds-entity-header">
                <span class="bonds-entity-name" style="color: {{entityColor}};">{{handle}}</span>
                <span class="bonds-entity-count">{{count}} bonds</span>
              </div>
              {{#each bonds}}
                <div class="bond-row">
                  <span class="bond-name">{{base}}</span>
                  <span class="bond-kind">{{type}}</span>
                </div>
              {{/each}}
            </div>
          {{/each}}
          {{#unless bondsGrouped}}
            <div class="empty-state">No bond data indexed.</div>
          {{/unless}}
        {{/if}}
      {{/if}}

      <!-- ============ KEYS VIEW ============ -->
      {{#if viewIs 'keys'}}
        <div class="section-label">Keys <span class="count">({{totalKeys}})</span></div>
        {{#each keysGrouped}}
          <div class="keys-entity-group">
            <div class="keys-entity-header">
              <span class="keys-entity-name" style="color: {{entityColor}};">{{handle}}</span>
              <span class="keys-entity-count">{{count}} keys</span>
            </div>
            {{#each keys}}
              <div class="key-row">
                <span class="key-name">{{filename}}</span>
                <span class="key-kind">{{type}}</span>
              </div>
            {{/each}}
          </div>
        {{/each}}
        {{#unless keysGrouped}}
          <div class="empty-state">No key data indexed.</div>
        {{/unless}}
      {{/if}}

      <!-- ============ TICKLES VIEW ============ -->
      {{#if viewIs 'tickles'}}
        <div class="section-label">Pending Tickles <span class="count">({{totalTickles}})</span></div>
        {{#each ticklesGrouped}}
          <div class="tickle-entity-group">
            <div class="tickle-entity-header">
              <span class="tickle-entity-name" style="color: {{entityColor}};">{{handle}}</span>
              <span class="tickle-entity-count">{{count}} tickles</span>
            </div>
            {{#each tickles}}
              <div class="tickle-row">{{this}}</div>
            {{/each}}
          </div>
        {{/each}}
        {{#unless ticklesGrouped}}
          <div class="empty-state">No tickle data indexed.</div>
        {{/unless}}
      {{/if}}

      <!-- ============ ALERTS VIEW ============ -->
      {{#if viewIs 'alerts'}}
        <div class="section-label">Alerts &amp; Notifications <span class="count">({{alertCount}})</span></div>
        {{#each alertsGrouped}}
          <div class="alerts-entity-group">
            <div class="alerts-entity-header">
              <span class="alerts-entity-name" style="color: {{entityColor}};">{{entity}}</span>
            </div>
            {{#each items}}
              <div class="alert-row">
                <span class="alert-source {{source}}">{{source}}</span>
                <span class="alert-text">{{text}}</span>
              </div>
            {{/each}}
          </div>
        {{/each}}
        {{#unless alertsGrouped}}
          <div class="empty-state">No active alerts.</div>
        {{/unless}}
      {{/if}}

    </div>

    <!-- ============ ACTIVITY PANEL (always visible) ============ -->
    <div class="activity-panel">

      {{#if activeFlightsList.length}}
      <div class="activity-section">
        <div class="section-label">Active Flights <span class="count">({{flyingCount}})</span></div>
        {{#each activeFlightsList}}
          <div class="flight-pinned">
            <div class="emission-header">
              <span class="emission-entity" style="color: {{entityColor}};">{{entity}}</span>
              <span class="emission-type flight">flying</span>
              {{#if model}}<span class="flight-model">{{model}}</span>{{/if}}
              <span class="emission-time">{{elapsed}}</span>
            </div>
            <div class="emission-body">{{briefSlug}}{{#if briefSummary}} &mdash; {{briefSummary}}{{/if}}</div>
          </div>
        {{/each}}
      </div>
      {{/if}}

      {{#if alertFeed.length}}
      <div class="activity-section">
        <div class="section-label">Alerts <span class="count">({{alertCount}})</span></div>
        {{#each alertFeed}}
          <div class="alert-item">
            <div class="emission-header">
              <span class="emission-entity" style="color: {{entityColor}};">{{entity}}</span>
              <span class="emission-type alert">{{source}}</span>
            </div>
            <div class="{{bodyClass}}">{{text}}</div>
          </div>
        {{/each}}
      </div>
      {{/if}}

      <div class="activity-section" style="flex: 1;">
        <div class="section-label">Emissions</div>
        {{#each emissions}}
          <div class="emission-item">
            <div class="emission-header">
              <span class="emission-entity" style="color: {{entityColor}};">{{entity}}</span>
              <span class="emission-type {{type}}">{{type}}</span>
              <span class="emission-time">{{relativeTime}}</span>
            </div>
            <div class="emission-body">{{body}}</div>
          </div>
        {{/each}}
        {{#unless emissions}}
          <div class="empty-state">No emissions in the last 6 hours.</div>
          {{#if publicTierHint}}
          <div class="tier-nudge">
            <span class="tier-nudge-text">Members see 24h of history.</span>
            <a href="/insiders" class="tier-nudge-link">Sign in →</a>
          </div>
          {{/if}}
        {{/unless}}
      </div>

      <div class="activity-section">
        <div class="section-label">Recent Flights</div>
        {{#each landedFlights}}
          <div class="emission-item">
            <div class="emission-header">
              <span class="emission-entity" style="color: {{entityColor}};">{{entity}}</span>
              <span class="emission-type flight">{{status}}</span>
              {{#if model}}<span class="flight-model">{{model}}</span>{{/if}}
              <span class="emission-time">{{relativeTime}}</span>
            </div>
            <div class="emission-body">{{briefSlug}} &mdash; {{elapsed}}{{#if completionSummary}} &mdash; {{completionSummary}}{{/if}}</div>
            {{#if hasStats}}
              <div class="emission-stats">
                {{#if stats.toolCalls}}<span class="emission-stat"><span class="sv">{{stats.toolCalls}}</span> tools</span>{{/if}}
                {{#if stats.inputTokens}}<span class="emission-stat"><span class="sv">{{formatTokens stats.inputTokens}}</span> in</span>{{/if}}
                {{#if stats.outputTokens}}<span class="emission-stat"><span class="sv">{{formatTokens stats.outputTokens}}</span> out</span>{{/if}}
                {{#if stats.cost}}<span class="emission-stat">$<span class="sv">{{formatCost stats.cost}}</span></span>{{/if}}
              </div>
            {{/if}}
          </div>
        {{/each}}
        {{#unless landedFlights}}
          <div class="empty-state">No recent flights.</div>
        {{/unless}}
        {{#if publicTierHint}}
        <div class="tier-nudge">
          <span class="tier-nudge-text">You're seeing the last 6h. Members see 24h.</span>
          <a href="/insiders" class="tier-nudge-link">Sign in →</a>
        </div>
        {{/if}}
      </div>

    </div>
  </div>
</template>

<!-- EntityProfilePanel: single-entity ego-network view for /<handle> pages.
     Named EntityProfilePanel to avoid collision with host app's EntityProfile template. -->
<template name="EntityProfilePanel">
  <style>
    /* Scoped additions for entity profile — inherits overview card/panel styles */
    .ep-header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 16px;
    }
    .ep-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    .ep-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ep-title { font-size: 22px; font-weight: 600; color: #e0e0e0; }
    .ep-tagline { font-size: 13px; color: #777; font-style: italic; margin-top: 2px; }
    .ep-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .ep-body { display: flex; gap: 0; height: calc(100vh - 100px); }
    .ep-main { flex: 1; padding: 20px 28px; overflow-y: auto; }
    .ep-sidebar { width: 360px; min-width: 280px; border-left: 1px solid #2a2a2a; padding: 20px 18px; overflow-y: auto; }
  </style>

  {{#if entityData}}
  <div class="ep-header">
    <div class="ep-avatar" style="background: {{entityData.accentColor}};">
      {{#if entityData.avatarImage}}
        <img src="{{entityData.avatarImage}}" alt="{{entityData.handle}}">
      {{else}}
        {{entityData.firstLetter}}
      {{/if}}
    </div>
    <div>
      <div class="ep-title">{{entityData.handle}}</div>
      {{#if entityData.tagline}}<div class="ep-tagline">{{entityData.tagline}}</div>{{/if}}
      <div class="ep-meta">
        {{#if entityData.role}}<span class="entity-role">{{entityData.role}}</span>{{/if}}
        {{#if entityData.host}}<span class="entity-host">{{entityData.host}}</span>{{/if}}
        <span class="entity-stat"><span class="stat-val">{{entityData.bondCount}}</span> bonds</span>
        <span class="entity-stat"><span class="stat-val">{{entityData.keyCount}}</span> keys</span>
      </div>
    </div>
  </div>
  <div class="ep-body">
    <div class="ep-main">

      <!-- Active flight -->
      {{#if entityData.activeFlight}}
      <div class="section-label" style="margin-bottom: 8px;">Active Flight</div>
      <div class="flight-pinned" style="margin-bottom: 20px;">
        <div class="emission-header">
          <span class="emission-entity" style="color: {{entityData.accentColor}};">{{entityData.handle}}</span>
          <span class="emission-type flight">flying</span>
          {{#if entityData.flightModel}}<span class="flight-model">{{entityData.flightModel}}</span>{{/if}}
          <span class="emission-time">{{entityData.flightElapsed}}</span>
        </div>
        <div class="emission-body">{{entityData.flightBrief}}</div>
      </div>
      {{/if}}

      <!-- Recent flights -->
      <div class="section-label">Flights <span class="count">({{entityFlightsCount}})</span></div>
      {{#each entityFlights}}
        <div class="emission-item">
          <div class="emission-header">
            <span class="emission-type flight">{{status}}</span>
            {{#if model}}<span class="flight-model">{{model}}</span>{{/if}}
            <span class="emission-time">{{relativeTime}}</span>
          </div>
          <div class="emission-body">{{briefSlug}} &mdash; {{elapsed}}</div>
          {{#if hasStats}}
            <div class="emission-stats">
              {{#if stats.toolCalls}}<span class="emission-stat"><span class="sv">{{stats.toolCalls}}</span> tools</span>{{/if}}
              {{#if stats.cost}}<span class="emission-stat">$<span class="sv">{{formatCost stats.cost}}</span></span>{{/if}}
            </div>
          {{/if}}
        </div>
      {{/each}}
      {{#unless entityFlights}}
        <div class="empty-state">No flights on record.</div>
      {{/unless}}

      <!-- Emissions -->
      <div class="section-label" style="margin-top: 24px;">Emissions</div>
      {{#each entityEmissions}}
        <div class="emission-item">
          <div class="emission-header">
            <span class="emission-type {{type}}">{{type}}</span>
            <span class="emission-time">{{relativeTime}}</span>
          </div>
          <div class="emission-body">{{body}}</div>
        </div>
      {{/each}}
      {{#unless entityEmissions}}
        <div class="empty-state">No emissions on record.</div>
      {{/unless}}

    </div>
    <div class="ep-sidebar">

      <!-- Bonds ego-network -->
      <div class="section-label">Bonds</div>
      {{#each entityBonds}}
        <div class="bond-row" style="padding-left: 0;">
          <span class="bond-name">{{base}}</span>
          <span class="bond-kind">{{type}}</span>
        </div>
      {{/each}}
      {{#unless entityBonds}}
        <div class="empty-state">No bonds indexed.</div>
      {{/unless}}

      <!-- Keys -->
      <div class="section-label" style="margin-top: 20px;">Keys</div>
      {{#each entityKeys}}
        <div class="key-row" style="padding-left: 0;">
          <span class="key-name">{{filename}}</span>
          <span class="key-kind">{{type}}</span>
        </div>
      {{/each}}
      {{#unless entityKeys}}
        <div class="empty-state">No keys indexed.</div>
      {{/unless}}

    </div>
  </div>
  {{else}}
  <div style="padding: 40px; color: #555; font-style: italic;">Entity not found.</div>
  {{/if}}
</template>
