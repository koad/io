<template name="ApplicationLayout">
  <div class="application-containment" role="application" aria-label="Application layout">

    <!-- CENTER CONTAINER -->
    <main class="content-containment {{contentState.left}} {{contentState.right}}"
          role="main">
      {{> yield}}
      <a href="#" class="back-to-top" aria-label="Scroll back to top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
        <span>Top</span>
      </a>
    </main>

    <!-- LEFT STACK -->
    {{#each leftPanels}}
      <aside class="panel-containment left {{state}}"
             data-id="{{id}}"
             role="complementary"
             aria-label="{{title}}">
        {{#if title}}
          <header class="panel-header">
            <h2>{{title}}</h2>
            <div class="panel-nav">
              {{#if canBack}}
                <button type="button" data-back-history aria-label="Go back">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                  </svg>
                </button>
              {{/if}}
              {{#if canForward}}
                <button type="button" data-forward-history aria-label="Go forward">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </button>
              {{/if}}
            </div>
            <button type="button" class="panel-close" data-close-panel aria-label="Close panel">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
        {{/if}}
        <div class="panel-handle left" aria-hidden="true"></div>
        {{> Template.dynamic template=template data=data}}
        <a href="#" class="back-to-top" aria-label="Scroll panel back to top">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
          <span>Top</span>
        </a>
      </aside>
    {{/each}}

    <!-- RIGHT STACK -->
    {{#each rightPanels}}
      <aside class="panel-containment right {{state}}"
             data-id="{{id}}"
             role="complementary"
             aria-label="{{title}}">
        {{#if title}}
          <header class="panel-header">
            <h2>{{title}}</h2>
            <div class="panel-nav">
              {{#if canBack}}
                <button type="button" data-back-history aria-label="Go back">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                  </svg>
                </button>
              {{/if}}
              {{#if canForward}}
                <button type="button" data-forward-history aria-label="Go forward">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </button>
              {{/if}}
            </div>
            <button type="button" class="panel-close" data-close-panel aria-label="Close panel">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </header>
        {{/if}}
        <div class="panel-handle right" aria-hidden="true"></div>
        {{> Template.dynamic template=template data=data}}
        <a href="#" class="back-to-top" aria-label="Scroll panel back to top">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
          <span>Top</span>
        </a>
      </aside>
    {{/each}}

  </div>
</template>
